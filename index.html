<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <title id="pageTitle">Mapbox Classic スタイル生成</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="main.css" />
  <script src="https://cdn.jsdelivr.net/npm/i18next@23.7.6/dist/umd/i18next.min.js"></script>
  <script src="https://app.dataviz.jp/lib/supabase.js" defer></script>
  <script src="https://app.dataviz.jp/lib/dataviz-auth-client.js" defer></script>
</head>

<body>
  <main class="container">
    <h1 id="mainTitle">Mapbox Classic スタイル生成</h1>
    <p id="mainDesc">
      トークンを入力し、スタイルを選んでください。Mapbox Classic スタイル用の「JSONファイル取得のためのURL」を生成します。
    </p>

    <form id="generator-form">
      <label for="token" id="tokenLabel">トークン（TOKEN）</label>
      <input type="text" id="token" name="token" placeholder="pk.XXXXXXXXXXXX" autocomplete="off" required />

      <label for="style" id="styleLabel">地図タイル（クラシック・スタイル）</label>
      <select id="style" name="style" required>
        <option value="" id="styleSelect">スタイルを選択してください</option>
      </select>

      <figure id="preview-wrapper" class="preview-wrapper" hidden>
        <figcaption><strong id="previewLabel">スタイル プレビュー</strong></figcaption>
        <img id="style-preview" alt="" />
      </figure>

      <button type="submit" id="generateBtn">URL を生成</button>
      <p class="message" id="message"></p>
    </form>

    <section id="result-section" class="result" hidden>
      <strong id="urlLabel">生成された URL</strong>
      <p id="generated-url"></p>
      <button type="button" class="secondary" id="download-btn" disabled id="downloadBtnLabel">
        JSON をダウンロード
      </button>
    </section>

    <footer>
      <h2 id="linksTitle">関連リンク</h2>
      <ul>
        <li><a id="linkClassicStyles" href="https://docs.mapbox.com/api/maps/styles/#classic-mapbox-styles" target="_blank"
            rel="noopener noreferrer">クラシック・スタイルの紹介</a></li>
        <li><a id="linkAccessTokens" href="https://console.mapbox.com/account/access-tokens/" target="_blank"
            rel="noopener noreferrer">トークンの取得ページ</a></li>
      </ul>
    </footer>
  </main>

  <script type="module" src="./main.js"></script>
</body>

</html>
